<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquetipo Distribución Push & Pull</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f7f5; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
canvas { display: block; width: 100vw; height: 100vh; }
#ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.badge {
  position: absolute; top: 22px; left: 40px;
  background: rgba(220,80,20,0.12); border: 1px solid rgba(220,80,20,0.3);
  color: #dc5014; font-size: 0.62rem; letter-spacing: 0.2em;
  text-transform: uppercase; padding: 5px 13px; border-radius: 20px;
}
h1 {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  font-size: clamp(1.0rem,2.2vw,1.5rem); font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; color: #1a2e1a;
  text-shadow: 0 2px 12px rgba(0,120,50,0.15);
  white-space: nowrap;
}
.sub {
  position: absolute; top: 38px; left: 50%; transform: translateX(-50%);
  font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(0,130,60,0.7); white-space: nowrap;
}
#leg {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
}
.li { display: flex; align-items: center; gap: 7px; font-size: 0.66rem; letter-spacing: 0.07em; text-transform: uppercase; color: #333; font-weight: 600; }
.ld { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
#tip {
  position: fixed; background: rgba(255,255,255,0.97); border: 1px solid rgba(0,150,70,0.35);
  color: #222; padding: 10px 15px; border-radius: 10px; font-size: 0.78rem;
  pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 99; max-width: 250px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
#tip b { display: block; color: #007a35; margin-bottom: 3px; font-size: 0.88rem; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">

  <h1>Arquetipo Distribución — Push &amp; Pull</h1>
  <div class="sub">2 Caminos de Distribución · Sell In → Sell Out</div>
  <div id="leg"></div>
</div>
<div id="tip"></div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const tip = document.getElementById('tip');

function rgb(co,a=1){ return `rgba(${co[0]},${co[1]},${co[2]},${a})`; }

// ── Tipos de nodo ─────────────────────────────────────────────
const TYPES = {
  proveedor:    { label:'Proveedor',           sublabel:null,          desc:'Fuente de insumos y productos agrícolas',                           col:[0,150,210],  r:26 },
  distribuidor: { label:'Distribuidor',         sublabel:null,          desc:'Canal de distribución regional — Sell In / Sell Out',               col:[120,50,220], r:22 },
  asesor:       { label:'Asesor',               sublabel:'(Técnico)',   desc:'Asesor Técnico — intermediario especializado del Camino 1',         col:[200,155,0],  r:21 },
  agr_tec:      { label:'Agricultor',           sublabel:null,          desc:'Agricultor de medio a bajo nivel tecnológico — Camino 1',            col:[0,170,70],   r:13 },
  agr_alto:     { label:'Agr. Alto Impacto',   sublabel:'(Técnico)',   desc:'Agricultor de Alto Impacto atendido directamente — Camino 2',       col:[0,120,50],   r:21 },
};

// row 0 — Proveedores     (shared, ancho completo)
// row 1 — Distribuidores  (shared, ancho completo)
// row 2 left  — Asesores          (camino 1)
// row 3 left  — Agricultores Téc  (camino 1)
// row 2 right — Agr. Alto Impacto (camino 2, misma altura que row 2 pero derecha)
// Camino 2 no tiene row 3 — termina en Alto Impacto

const RAW = [
  { type:'proveedor',    path:0, row:0 },
  { type:'proveedor',    path:0, row:0 },
  { type:'proveedor',    path:0, row:0 },
  { type:'proveedor',    path:0, row:0 },

  { type:'distribuidor', path:0, row:1 },
  { type:'distribuidor', path:0, row:1 },
  { type:'distribuidor', path:0, row:1 },
  { type:'distribuidor', path:0, row:1 },
  { type:'distribuidor', path:0, row:1 },

  // Camino 1 — Asesor (row 2 left) — pocos asesores
  { type:'asesor', path:1, row:2 },
  { type:'asesor', path:1, row:2 },
  { type:'asesor', path:1, row:2 },

  // Camino 1 — Agricultores (row 3 ancho completo)
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },
  { type:'agr_tec', path:0, row:3 },

  // Camino 2 — Agr. Alto Impacto (row 2 right — mismo nivel que Asesor)
  { type:'agr_alto', path:2, row:2 },
  { type:'agr_alto', path:2, row:2 },
  { type:'agr_alto', path:2, row:2 },
  { type:'agr_alto', path:2, row:2 },
  { type:'agr_alto', path:2, row:2 },
  { type:'agr_alto', path:2, row:2 },
];

let nodes=[], pulses=[], W, H, t=0;

function build(){
  c.width = W = window.innerWidth;
  c.height= H = window.innerHeight;
  nodes=[]; pulses=[];

  const padX   = 70;
  const splitX = W * 0.58;

  // Y positions — camino 1 tiene 4 filas, camino 2 tiene 3
  const rowY = {
    0: H * 0.14,   // Proveedores
    1: H * 0.36,   // Distribuidores
    2: H * 0.60,   // Asesores (C1) / Agr. Alto Impacto (C2)
    3: H * 0.86,   // Agricultores (ancho completo)
  };

  const groups={};
  RAW.forEach(r=>{
    const key=`${r.row}_${r.path}`;
    if(!groups[key]) groups[key]=[];
    groups[key].push(r);
  });

  Object.entries(groups).forEach(([key,arr])=>{
    const [rowS,pathS]=key.split('_');
    const row=parseInt(rowS), path=parseInt(pathS);
    const n=arr.length;
    const y=rowY[row];

    let xStart, xEnd;
    if(path===0)      { xStart=padX;      xEnd=W-padX;    }  // shared
    else if(path===1) { xStart=padX;      xEnd=splitX-50; }  // camino 1 left
    else              { xStart=splitX+50; xEnd=W-padX;    }  // camino 2 right

    const usW=xEnd-xStart;
    arr.forEach((r,i)=>{
      const x=n===1?(xStart+xEnd)/2:xStart+(usW/(n-1))*i;
      const jitter=(Math.random()-0.5)*12;
      nodes.push({
        x:x+jitter, y, ox:x+jitter, oy:y,
        def:TYPES[r.type], path, row,
        ph:Math.random()*Math.PI*2,
        sp:0.28+Math.random()*0.35,
        hov:false
      });
    });
  });

  // Legend
  const leg=document.getElementById('leg');
  leg.innerHTML='';
  Object.values(TYPES).forEach(d=>{
    leg.innerHTML+=`<div class="li"><div class="ld" style="background:${rgb(d.col)};box-shadow:0 0 6px ${rgb(d.col,0.7)}"></div>${d.label}${d.sublabel?' '+d.sublabel:''}</div>`;
  });
}

function drawBg(){
  ctx.fillStyle='#f5f7f5';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,120,50,0.06)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=55){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=55){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawEdgePair(srcs,tgts){
  srcs.forEach(n=>{
    tgts.forEach(m=>{
      const hi=n.hov||m.hov;
      const grad=ctx.createLinearGradient(n.x,n.y,m.x,m.y);
      grad.addColorStop(0,rgb(n.def.col,hi?0.78:0.30));
      grad.addColorStop(1,rgb(m.def.col,hi?0.78:0.30));
      ctx.beginPath();
      ctx.moveTo(n.x,n.y);
      ctx.lineTo(m.x,m.y);
      ctx.strokeStyle=grad;
      ctx.lineWidth=hi?2.2:1.0;
      ctx.stroke();
    });
  });
}

function drawEdges(){
  const provs  = nodes.filter(n=>n.def===TYPES.proveedor);
  const dists  = nodes.filter(n=>n.def===TYPES.distribuidor);
  const asesors= nodes.filter(n=>n.def===TYPES.asesor);
  const agrtec = nodes.filter(n=>n.def===TYPES.agr_tec);
  const agralto= nodes.filter(n=>n.def===TYPES.agr_alto);

  drawEdgePair(provs,   dists);
  drawEdgePair(dists,   asesors);   // C1: dist → asesor
  // C1: cada asesor conecta EXCLUSIVAMENTE con su grupo de agricultores
  const numAsesores = asesors.length; // 5
  agrtec.forEach((agr, ai) => {
    // Asignar agricultor al asesor correspondiente (round-robin)
    const asesorIdx = ai % numAsesores;
    const asesor = asesors[asesorIdx];
    const hi = asesor.hov || agr.hov;
    const grad = ctx.createLinearGradient(asesor.x, asesor.y, agr.x, agr.y);
    grad.addColorStop(0, rgb(asesor.def.col, hi?0.78:0.30));
    grad.addColorStop(1, rgb(agr.def.col,    hi?0.78:0.30));
    ctx.beginPath();
    ctx.moveTo(asesor.x, asesor.y);
    ctx.lineTo(agr.x, agr.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = hi ? 2.2 : 1.0;
    ctx.stroke();
  });
  drawEdgePair(dists,   agralto);   // C2: dist → agr alto impacto
}

function drawPill(x,y,text,col,w){
  w = w||92;
  const h=20;
  ctx.beginPath();
  ctx.roundRect(x-w/2,y-h/2,w,h,10);
  ctx.fillStyle=rgb(col,0.11);
  ctx.fill();
  ctx.strokeStyle=rgb(col,0.38);
  ctx.lineWidth=1;
  ctx.stroke();
  ctx.font='700 9.5px Segoe UI';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle=rgb(col,0.9);
  ctx.fillText(text,x,y);
}

function drawRowDot(x,y,col){
  ctx.beginPath();
  ctx.arc(x,y,5,0,Math.PI*2);
  ctx.fillStyle=rgb(col,0.5);
  ctx.fill();
}

function drawAnnotations(){
  const provs  = nodes.filter(n=>n.row===0);
  const dists  = nodes.filter(n=>n.row===1);
  const mid2   = nodes.filter(n=>n.row===2);
  const bot    = nodes.filter(n=>n.row===3);
  if(!provs.length||!dists.length||!mid2.length) return;

  const y0=provs[0].oy, y1=dists[0].oy, y2=mid2[0].oy;
  const y3=bot.length ? bot[0].oy : H*0.82;
  const splitX=W*0.58;

  // SELL IN / SELL OUT pills centradas
  drawPill(W/2, (y0+y1)/2, 'SELL IN',  [0,150,210], 90);
  drawPill(W/2, (y1+y2)/2, 'SELL OUT', [120,50,220], 90);

  // Divisor vertical entre caminos
  ctx.beginPath();
  ctx.setLineDash([5,7]);
  ctx.moveTo(splitX, y1+38);
  ctx.lineTo(splitX, y3+10);
  ctx.strokeStyle='rgba(0,0,0,0.1)';
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.setLineDash([]);

  // Labels de camino
  const midC1 = splitX/2;
  const midC2 = splitX+(W-splitX)/2;
  const labelY = (y1+y2)/2 + 22;

  ctx.textAlign='center';
  ctx.font='700 11px Segoe UI';
  ctx.fillStyle='rgba(200,155,0,0.8)';
  ctx.fillText('CAMINO 1', midC1, labelY);
  ctx.font='600 10px Segoe UI';
  ctx.fillStyle='rgba(200,155,0,0.6)';
  ctx.fillText('Dist → Asesor → Agricultor', midC1, labelY+15);

  ctx.font='700 11px Segoe UI';
  ctx.fillStyle='rgba(0,120,50,0.8)';
  ctx.fillText('CAMINO 2', midC2, labelY);
  ctx.font='600 10px Segoe UI';
  ctx.fillStyle='rgba(0,120,50,0.6)';
  ctx.fillText('Dist → Agr. Alto Impacto', midC2, labelY+15);

  // Row labels arriba-izquierda, separadas de los nodos
  const off=46;
  ctx.font='600 11px Segoe UI';
  ctx.textAlign='left';
  ctx.textBaseline='middle';

  drawRowDot(24, y0-off, [0,150,210]);
  ctx.fillStyle=rgb([0,150,210],0.8);
  ctx.fillText('PROVEEDORES', 36, y0-off);

  drawRowDot(24, y1-off, [120,50,220]);
  ctx.fillStyle=rgb([120,50,220],0.8);
  ctx.fillText('DISTRIBUIDORES', 36, y1-off);

  drawRowDot(24, y2-off, [160,120,0]);
  ctx.fillStyle='rgba(160,120,0,0.8)';
  ctx.fillText('ASESORES  /  AGR. ALTO IMPACTO', 36, y2-off);

  if(bot.length){
    drawRowDot(24, y3-off, [0,140,60]);
    ctx.fillStyle='rgba(0,140,60,0.8)';
    ctx.fillText('AGRICULTORES (medio a bajo nivel tecnológico)', 36, y3-off);
  }


}

function drawPulses(){
  for(let i=pulses.length-1;i>=0;i--){
    const p=pulses[i];
    p.t+=0.013;
    if(p.t>1){pulses.splice(i,1);continue;}
    const x=p.x0+(p.x1-p.x0)*p.t;
    const y=p.y0+(p.y1-p.y0)*p.t;
    const a=Math.sin(p.t*Math.PI);
    ctx.beginPath();
    ctx.arc(x,y,4.5,0,Math.PI*2);
    ctx.fillStyle=rgb(p.col,a);
    ctx.shadowBlur=15;
    ctx.shadowColor=rgb(p.col,0.9);
    ctx.fill();
    ctx.shadowBlur=0;
  }
}

function drawNodes(){
  nodes.forEach(n=>{
    n.x=n.ox+Math.sin(t*n.sp+n.ph)*4.5;
    n.y=n.oy+Math.cos(t*n.sp*0.65+n.ph)*2.5;
    const r=n.def.r, co=n.def.col;

    // Glow
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*3.2);
    g.addColorStop(0,rgb(co,0.16));
    g.addColorStop(1,rgb(co,0));
    ctx.beginPath();
    ctx.arc(n.x,n.y,r*3.2,0,Math.PI*2);
    ctx.fillStyle=g;
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.fillStyle=rgb(co,0.9);
    ctx.shadowBlur=n.hov?28:12;
    ctx.shadowColor=rgb(co,0.65);
    ctx.fill();
    ctx.shadowBlur=0;

    // Shine
    ctx.beginPath();
    ctx.arc(n.x-r*0.3,n.y-r*0.3,r*0.38,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.fill();

    // Border
    ctx.beginPath();
    ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.strokeStyle=n.hov?'#222':rgb(co,0.7);
    ctx.lineWidth=n.hov?2.5:1.5;
    ctx.stroke();

    // Label: main bold + sublabel smaller
    const fs=Math.max(7,r*0.36);
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.shadowBlur=4;
    ctx.shadowColor='rgba(0,0,0,0.5)';
    if(n.def.sublabel){
      ctx.font=`700 ${fs}px Segoe UI`;
      ctx.fillStyle='#fff';
      ctx.fillText(n.def.label, n.x, n.y - fs*0.58);
      ctx.font=`400 ${Math.max(6,fs*0.72)}px Segoe UI`;
      ctx.fillStyle='rgba(255,255,255,0.80)';
      ctx.fillText(n.def.sublabel, n.x, n.y + fs*0.68);
    } else {
      ctx.font=`700 ${fs}px Segoe UI`;
      ctx.fillStyle='#fff';
      ctx.fillText(n.def.label, n.x, n.y);
    }
    ctx.shadowBlur=0;
  });
}

let lastP=0;
function spawnPulse(now){
  if(now-lastP<175) return;
  lastP=now;
  const chains=[
    [TYPES.proveedor,    TYPES.distribuidor],
    [TYPES.distribuidor, TYPES.asesor],       // C1
    [TYPES.distribuidor, TYPES.asesor],
    // C1 cont. — pulso de asesor a su agricultor exclusivo
    [TYPES.asesor, TYPES.agr_tec],
    [TYPES.distribuidor, TYPES.agr_alto],     // C2
  ];
  const chain=chains[Math.floor(Math.random()*chains.length)];
  const srcs=nodes.filter(n=>n.def===chain[0]);
  const tgts=nodes.filter(n=>n.def===chain[1]);
  if(!srcs.length||!tgts.length) return;
  const s=srcs[Math.floor(Math.random()*srcs.length)];

  let g;
  // Si el pulso es de asesor → agricultor, respetar asignación exclusiva
  if(chain[0]===TYPES.asesor && chain[1]===TYPES.agr_tec){
    const asesorIdx = srcs.indexOf(s);
    const numAsesores = srcs.length;
    const myFarmers = tgts.filter((_,ai) => ai % numAsesores === asesorIdx);
    if(!myFarmers.length) return;
    g = myFarmers[Math.floor(Math.random()*myFarmers.length)];
  } else {
    g = tgts[Math.floor(Math.random()*tgts.length)];
  }
  pulses.push({x0:s.x,y0:s.y,x1:g.x,y1:g.y,t:0,col:s.def.col});
}

c.addEventListener('mousemove',e=>{
  const mx=e.clientX,my=e.clientY;
  let hov=null;
  nodes.forEach(n=>{
    n.hov=Math.hypot(n.x-mx,n.y-my)<n.def.r+10;
    if(n.hov) hov=n;
  });
  if(hov){
    tip.style.opacity='1';
    tip.style.left=(e.clientX+18)+'px';
    tip.style.top=(e.clientY-10)+'px';
    tip.innerHTML=`<b>${hov.def.label}${hov.def.sublabel?' '+hov.def.sublabel:''}</b>${hov.def.desc}`;
    c.style.cursor='pointer';
  } else {
    tip.style.opacity='0';
    c.style.cursor='default';
  }
});
c.addEventListener('mouseleave',()=>{nodes.forEach(n=>n.hov=false);tip.style.opacity='0';});

function loop(now){
  requestAnimationFrame(loop);
  t+=0.012;
  drawBg();
  drawAnnotations();
  drawEdges();
  drawPulses();
  drawNodes();
  spawnPulse(now);
}

window.addEventListener('resize',build);
build();
requestAnimationFrame(loop);
</script>
</body>
</html>
